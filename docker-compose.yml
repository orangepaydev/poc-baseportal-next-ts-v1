services:
  mariadb:
    image: mariadb:11.4
    container_name: portaldb-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass123
      MARIADB_DATABASE: portaldb
      MARIADB_USER: dbuser
      MARIADB_PASSWORD: dbpass123
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker-init/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD',
          'mariadb-admin',
          'ping',
          '-h',
          '127.0.0.1',
          '-uroot',
          '-prootpass123',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  smtpdev:
    image: rnwood/smtp4dev:latest
    container_name: portaldb-smtpdev
    restart: unless-stopped
    ports:
      # Host apps should use EMAIL_SMTP_HOST=127.0.0.1 and EMAIL_SMTP_PORT=2525.
      # Containers on the same Compose network can use smtpdev:25 directly.
      - '2525:25'
      - '3001:80'

volumes:
  mariadb_data:
